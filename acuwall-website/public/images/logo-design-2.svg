<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <!-- DESIGN 2: Shield Protection -->
  <defs>
    <linearGradient id="orange2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5528;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield icon with sound waves inside -->
  <g transform="translate(10, 15)">
    <path d="M 25,5 L 45,5 L 50,10 L 50,35 Q 50,45 25,50 Q 0,45 0,35 L 0,10 Z" fill="url(#orange2)" opacity="0.15" stroke="url(#orange2)" stroke-width="2"/>
    <!-- Sound waves inside shield -->
    <line x1="15" y1="20" x2="15" y2="30" stroke="url(#orange2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="17" x2="22" y2="33" stroke="url(#orange2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="29" y1="20" x2="29" y2="30" stroke="url(#orange2)" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="15" x2="36" y2="35" stroke="url(#orange2)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="70" y="48" font-family="'Arial Black', Arial, sans-serif" font-size="34" font-weight="900" fill="url(#orange2)" letter-spacing="1">
    AcuWall
  </text>
  <text x="72" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" letter-spacing="1.5" opacity="0.85">
    Csendet építünk
  </text>
</svg>
