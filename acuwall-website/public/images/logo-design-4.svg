    <polygon points="5,15 15,10 25,15 25,25 15,30 5,25" fill="url(#orange4)" opacity="0.3" stroke="url(#orange4)" stroke-width="2"/>
    <polygon points="35,15 45,10 55,15 55,25 45,30 35,25" fill="url(#orange4)" opacity="0.5" stroke="url(#orange4)" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="75" y="47" font-family="'Arial', sans-serif" font-size="38" font-weight="800" fill="url(#orange4)" letter-spacing="0">
    AcuWall
  </text>
  <text x="77" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" letter-spacing="1.5" opacity="0.85">
    Csendet építünk
  </text>
  
  <!-- Tech dots -->
  <circle cx="250" cy="45" r="2" fill="#FF3000" opacity="0.4"/>
  <circle cx="258" cy="45" r="2" fill="#FF3000" opacity="0.6"/>
  <circle cx="266" cy="45" r="2" fill="#FF3000" opacity="0.8"/>
