<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <!-- DESIGN 4: Hexagon Tech -->
  <defs>
    <linearGradient id="orange4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5528;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon cluster -->
