<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <!-- DESIGN 5: Simple & Bold -->
  <defs>
    <linearGradient id="orange5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5528;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Simple "A" monogram in square -->
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="none" stroke="url(#orange5)" stroke-width="3"/>
    <text x="25" y="40" font-family="'Arial Black', Arial, sans-serif" font-size="36" font-weight="900" fill="url(#orange5)" text-anchor="middle">
      A
    </text>
  </g>
  
  <!-- Text - clean and corporate -->
  <text x="70" y="50" font-family="'Helvetica', Arial, sans-serif" font-size="40" font-weight="700" fill="url(#orange5)" letter-spacing="-1">
    AcuWall
  </text>
  <text x="72" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" letter-spacing="2" opacity="0.85">
    Csendet építünk
  </text>
</svg>
