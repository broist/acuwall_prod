<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <!-- DESIGN 1: Minimalist Sound Waves -->
  <defs>
    <linearGradient id="orange1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5528;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Curved sound waves - minimal and elegant -->
  <g transform="translate(10, 30)">
    <path d="M 0,15 Q 10,5 20,15 Q 30,25 40,15" stroke="url(#orange1)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 0,25 Q 12,12 24,25 Q 36,38 48,25" stroke="url(#orange1)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="70" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="url(#orange1)" letter-spacing="0">
    AcuWall
  </text>
  <text x="72" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" letter-spacing="1.5" opacity="0.85">
    Csendet építünk
  </text>
</svg>
