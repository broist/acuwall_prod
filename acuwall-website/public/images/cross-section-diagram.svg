<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#0F172A">
    AcuWall Panel Keresztmetszet
  </text>
  
  <!-- Panel Cross Section -->
  <g transform="translate(200, 150)">
    
    <!-- Left Fabeton Layer -->
    <rect x="0" y="0" width="80" height="300" fill="#8B7355" stroke="#5a4a3a" stroke-width="2"/>
    <text x="40" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#0F172A">
      Fa-kompozit réteg
    </text>
    <text x="40" y="-2" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">
      (Fabeton)
    </text>
    
    <!-- Concrete Core -->
    <rect x="80" y="0" width="240" height="300" fill="#9CA3AF" stroke="#6b7280" stroke-width="2"/>
    <text x="200" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#0F172A">
      Vasbeton mag
    </text>
    <text x="200" y="-2" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">
      (Szerkezeti stabilitás)
    </text>
    
    <!-- Right Fabeton Layer -->
    <rect x="320" y="0" width="80" height="300" fill="#8B7355" stroke="#5a4a3a" stroke-width="2"/>
    <text x="360" y="-15" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#0F172A">
      Fa-kompozit réteg
    </text>
    <text x="360" y="-2" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">
      (Fabeton)
    </text>
    
    <!-- Dimension arrows and measurements -->
    <!-- Left layer width -->
    <line x1="5" y1="320" x2="75" y2="320" stroke="#FF3000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="75" y1="320" x2="5" y2="320" stroke="#FF3000" stroke-width="2" marker-start="url(#arrowhead)"/>
    <text x="40" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#FF3000">
      8 cm
    </text>
    
    <!-- Center width -->
    <line x1="85" y1="320" x2="315" y2="320" stroke="#FF3000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="315" y1="320" x2="85" y2="320" stroke="#FF3000" stroke-width="2" marker-start="url(#arrowhead)"/>
    <text x="200" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#FF3000">
      24 cm
    </text>
    
    <!-- Right layer width -->
    <line x1="325" y1="320" x2="395" y2="320" stroke="#FF3000" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="395" y1="320" x2="325" y2="320" stroke="#FF3000" stroke-width="2" marker-start="url(#arrowhead)"/>
    <text x="360" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#FF3000">
      8 cm
    </text>
    
    <!-- Total width -->
    <line x1="0" y1="360" x2="400" y2="360" stroke="#0F172A" stroke-width="3" marker-end="url(#arrowhead-dark)"/>
    <line x1="400" y1="360" x2="0" y2="360" stroke="#0F172A" stroke-width="3" marker-start="url(#arrowhead-dark)"/>
    <text x="200" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0F172A">
      Teljes vastagság: 40 cm
    </text>
    
    <!-- Height measurement -->
    <line x1="420" y1="10" x2="420" y2="290" stroke="#0F172A" stroke-width="3" marker-end="url(#arrowhead-dark)"/>
    <line x1="420" y1="290" x2="420" y2="10" stroke="#0F172A" stroke-width="3" marker-start="url(#arrowhead-dark)"/>
    <text x="440" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#0F172A">
      50 cm
    </text>
    
    <!-- Texture patterns for materials -->
    <!-- Fabeton texture (left) -->
    <g opacity="0.3">
      <line x1="10" y1="20" x2="70" y2="20" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="40" x2="70" y2="40" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="60" x2="70" y2="60" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="80" x2="70" y2="80" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="100" x2="70" y2="100" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="120" x2="70" y2="120" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="140" x2="70" y2="140" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="160" x2="70" y2="160" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="180" x2="70" y2="180" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="200" x2="70" y2="200" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="220" x2="70" y2="220" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="240" x2="70" y2="240" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="260" x2="70" y2="260" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="10" y1="280" x2="70" y2="280" stroke="#5a4a3a" stroke-width="1"/>
    </g>
    
    <!-- Concrete texture (center) -->
    <g opacity="0.2">
      <circle cx="120" cy="40" r="3" fill="#6b7280"/>
      <circle cx="180" cy="60" r="4" fill="#6b7280"/>
      <circle cx="240" cy="80" r="3" fill="#6b7280"/>
      <circle cx="150" cy="120" r="3" fill="#6b7280"/>
      <circle cx="210" cy="140" r="4" fill="#6b7280"/>
      <circle cx="270" cy="160" r="3" fill="#6b7280"/>
      <circle cx="140" cy="200" r="3" fill="#6b7280"/>
      <circle cx="200" cy="220" r="4" fill="#6b7280"/>
      <circle cx="260" cy="240" r="3" fill="#6b7280"/>
    </g>
    
    <!-- Fabeton texture (right) -->
    <g opacity="0.3">
      <line x1="330" y1="20" x2="390" y2="20" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="40" x2="390" y2="40" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="60" x2="390" y2="60" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="80" x2="390" y2="80" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="100" x2="390" y2="100" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="120" x2="390" y2="120" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="140" x2="390" y2="140" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="160" x2="390" y2="160" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="180" x2="390" y2="180" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="200" x2="390" y2="200" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="220" x2="390" y2="220" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="240" x2="390" y2="240" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="260" x2="390" y2="260" stroke="#5a4a3a" stroke-width="1"/>
      <line x1="330" y1="280" x2="390" y2="280" stroke="#5a4a3a" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#FF3000"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#0F172A"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(50, 520)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0F172A">
      Jelölések:
    </text>
    
    <rect x="0" y="10" width="30" height="20" fill="#8B7355" stroke="#5a4a3a" stroke-width="1"/>
    <text x="40" y="25" font-family="Arial, sans-serif" font-size="14" fill="#0F172A">
      Hangelnyelő fabeton réteg
    </text>
    
    <rect x="250" y="10" width="30" height="20" fill="#9CA3AF" stroke="#6b7280" stroke-width="1"/>
    <text x="290" y="25" font-family="Arial, sans-serif" font-size="14" fill="#0F172A">
      Szerkezeti vasbeton mag
    </text>
  </g>
</svg>
