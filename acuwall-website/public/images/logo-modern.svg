<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Orange gradient for modern look -->
    <linearGradient id="modernOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5A2E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Modern Icon - Sound wave bars -->
  <g transform="translate(10, 25)">
    <!-- Sound wave visualization -->
    <rect x="0" y="15" width="8" height="20" rx="4" fill="url(#modernOrange)" filter="url(#glow)"/>
    <rect x="12" y="8" width="8" height="34" rx="4" fill="url(#modernOrange)" filter="url(#glow)"/>
    <rect x="24" y="12" width="8" height="26" rx="4" fill="url(#modernOrange)" filter="url(#glow)"/>
    <rect x="36" y="5" width="8" height="40" rx="4" fill="url(#modernOrange)" filter="url(#glow)"/>
    <rect x="48" y="18" width="8" height="14" rx="4" fill="url(#modernOrange)" filter="url(#glow)"/>
  </g>
  
  <!-- AcuWall Text - Bold and Modern -->
  <g>
    <text x="75" y="50" font-family="'Arial Black', 'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900" fill="url(#modernOrange)" letter-spacing="1">
      AcuWall
    </text>
    
    <!-- Underline accent -->
    <rect x="75" y="55" width="160" height="3" rx="1.5" fill="url(#modernOrange)" opacity="0.6"/>
  </g>
  
  <!-- Tagline - Clean and modern -->
  <text x="77" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="300" fill="#FFFFFF" letter-spacing="2" opacity="0.9">
    Csendet építünk
  </text>
  
  <!-- Minimal geometric accent -->
  <circle cx="265" cy="45" r="2" fill="#FF3000" opacity="0.5"/>
  <circle cx="275" cy="45" r="2" fill="#FF3000" opacity="0.7"/>
  <circle cx="285" cy="45" r="2" fill="#FF3000" opacity="0.9"/>
</svg>
