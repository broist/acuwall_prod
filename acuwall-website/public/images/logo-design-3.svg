<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <!-- DESIGN 3: Wall Panels -->
  <defs>
    <linearGradient id="orange3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5528;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Wall panels stacked -->
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="50" height="8" rx="2" fill="url(#orange3)" opacity="0.9"/>
    <rect x="0" y="12" width="50" height="8" rx="2" fill="url(#orange3)" opacity="0.7"/>
    <rect x="0" y="24" width="50" height="8" rx="2" fill="url(#orange3)" opacity="0.5"/>
    <rect x="0" y="36" width="50" height="8" rx="2" fill="url(#orange3)" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="70" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="600" fill="url(#orange3)" letter-spacing="0">
    AcuWall
  </text>
  <line x1="70" y1="52" x2="210" y2="52" stroke="url(#orange3)" stroke-width="2" opacity="0.4"/>
  <text x="72" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="300" fill="#FFFFFF" letter-spacing="1.5" opacity="0.95">
    "Csendet építünk"
  </text>
</svg>
