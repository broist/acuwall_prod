<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Orange gradient for brand -->
    <linearGradient id="orangeBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5528;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon/Emblem - Fork/Sound wave symbol (left side) -->
  <g transform="translate(15, 20)">
    <!-- Fork shape in orange -->
    <rect x="0" y="0" width="35" height="50" rx="8" fill="url(#orangeBrand)"/>
    <!-- Fork prongs -->
    <rect x="5" y="5" width="8" height="30" fill="#0F172A"/>
    <rect x="13" y="5" width="8" height="30" fill="#0F172A"/>
    <rect x="21" y="5" width="8" height="30" fill="#0F172A"/>
    <!-- Handle -->
    <rect x="8" y="35" width="18" height="10" fill="#0F172A"/>
  </g>
  
  <!-- AcuWall Text - Orange -->
  <text x="65" y="55" font-family="'Arial Black', Arial, sans-serif" font-size="42" font-weight="900" fill="url(#orangeBrand)" letter-spacing="2">
    AcuWall
  </text>
  
  <!-- Tagline - White -->
  <text x="70" y="85" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#FFFFFF" letter-spacing="3" style="font-style: italic;">
    "Csendet építünk"
  </text>
</svg>
